<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบบันทึกรอาหาร รพ.ไทรโยค</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
    .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; }
    .nav-tabs .nav-link { font-weight: bold; color: #555; }
    .nav-tabs .nav-link.active { color: #198754; border-bottom: 3px solid #198754; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
    .img-card { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    .card-title { font-size: 1rem; font-weight: bold; text-align: center; margin-top: 10px; color: #444; }
    .pagination-container { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner-border text-success" style="width: 3rem; height: 3rem;" role="status"></div>
  <h4 class="mt-3 text-success">กำลังดำเนินการ...</h4>
</div>

<div class="container py-4">
  <h3 class="mb-4 text-center text-success">🍽️ ระบบบันทึกอาหาร รพ.ไทรโยค</h3>

  <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="form-tab" data-bs-toggle="tab" data-bs-target="#form-pane" type="button" role="tab">📝 บันทึกอาหาร</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="report-tab" data-bs-toggle="tab" data-bs-target="#report-pane" type="button" role="tab">📊 รายงาน</button>
    </li>
  </ul>

  <div class="tab-content" id="myTabContent">
    <div class="tab-pane fade show active" id="form-pane" role="tabpanel">
      <div class="card">
        <div class="card-body p-4">
          <form id="foodForm">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">A. วันที่</label>
                <input type="date" class="form-control" id="date" required>
              </div>
              <div class="col-md-6 mt-3 mt-md-0">
                <label class="form-label fw-bold">B. รอบเบิก</label>
                <select class="form-select" id="round" required>
                  <option value="" disabled selected>เลือกรอบ...</option>
                  <option value="เช้า">เช้า</option>
                  <option value="เที่ยง">เที่ยง</option>
                  <option value="เย็น">เย็น</option>
                </select>
              </div>
            </div>
            <hr>
            <h6 class="text-secondary mb-3 fw-bold">เลือกรูปภาพ / ถ่ายภาพ (C-I)</h6>
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label">C. อาหารธรรมดา, อ่อน</label><input type="file" class="form-control" id="c_normal" accept="image/*" capture="environment"></div>
              <div class="col-md-6"><label class="form-label">D. อาหารเบาหวาน</label><input type="file" class="form-control" id="d_dm" accept="image/*" capture="environment"></div>
              <div class="col-md-6"><label class="form-label">E. อาหารทางสาย BD</label><input type="file" class="form-control" id="e_bd" accept="image/*" capture="environment"></div>
              <div class="col-md-6"><label class="form-label">F. อาหารงดดำแดง</label><input type="file" class="form-control" id="f_redblack" accept="image/*" capture="environment"></div>
              <div class="col-md-6"><label class="form-label">G. อาหารโรคไต</label><input type="file" class="form-control" id="g_kidney" accept="image/*" capture="environment"></div>
              <div class="col-md-6"><label class="form-label">H. อาหารห้องพิเศษ</label><input type="file" class="form-control" id="h_vip" accept="image/*" capture="environment"></div>
              <div class="col-md-12"><label class="form-label">I. อาหารอื่นๆ</label><input type="file" class="form-control" id="i_other" accept="image/*" capture="environment"></div>
            </div>
            <div class="text-center mt-4">
              <button type="button" class="btn btn-success btn-lg px-5" onclick="submitData()">💾 บันทึกข้อมูล</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="report-pane" role="tabpanel">
      <div class="card">
        <div class="card-body p-4">
          <div class="d-flex flex-column flex-md-row gap-3 align-items-end mb-4">
            <div class="flex-grow-1 w-100">
              <label class="form-label fw-bold">เลือกวันที่ (เว้นว่างเพื่อดูทั้งหมด)</label>
              <input type="date" class="form-control" id="searchDate">
            </div>
            <button class="btn btn-primary px-4" onclick="applyFilter()">🔍 ค้นหา</button>
            <button class="btn btn-success px-4" onclick="exportToExcel()">📥 Export Excel</button>
          </div>

          <div id="reportContainer"></div>

          <div class="pagination-container flex-column flex-md-row gap-3" id="paginationControls" style="display: none;">
            <div>
              <label>แสดง: </label>
              <select id="rowsPerPage" class="form-select d-inline-block w-auto" onchange="changeRowsPerPage()">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="50">50</option>
              </select> รายการ
            </div>
            <div>
              <button class="btn btn-sm btn-outline-secondary" onclick="prevPage()">ก่อนหน้า</button>
              <span id="pageInfo" class="mx-2 fw-bold">หน้า 1/1</span>
              <button class="btn btn-sm btn-outline-secondary" onclick="nextPage()">ถัดไป</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 🔴🔴🔴 นำ URL ของ Web App มาใส่ที่นี่ 🔴🔴🔴
  const API_URL = 'https://script.google.com/macros/s/AKfycbwQhqSZ6FivYPmPxdyK3fnh8IQU3qJgmNVu9vdXoQgruIYQ3ESJkQd3auRkI73i-Us2/exec'; 
  // ฟังก์ชันแปลงวันที่ให้เป็นภาษาไทยและคง ค.ศ. ไว้
function formatThaiDate(dateStr) {
  if (!dateStr) return "";
  try {
    let d = new Date(dateStr);
    
    // ตรวจสอบว่าเป็นรูปแบบ yyyy-MM-dd หรือไม่ ถ้าใช่ให้แปลงแบบ Local Time ป้องกัน Timezone เพี้ยน
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr.trim())) {
      let parts = dateStr.split('-');
      d = new Date(parts[0], parts[1] - 1, parts[2]);
    }
    
    if (isNaN(d.getTime())) return dateStr; // ถ้าแปลงไม่ได้ให้ส่งค่าเดิมกลับไป
    
    const weekdays = ["วันอาทิตย์", "วันจันทร์", "วันอังคาร", "วันพุธ", "วันพฤหัสบดี", "วันศุกร์", "วันเสาร์"];
    const months = [
      "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
      "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
    ];
    
    let weekday = weekdays[d.getDay()];
    let day = d.getDate();
    let month = months[d.getMonth()];
    let year = d.getFullYear(); // คงไว้เป็น ค.ศ. (เช่น 2026)
    
    return `${weekday}ที่ ${day} ${month} ${year}`;
  } catch (e) {
    return dateStr;
  }
}
  let allReportData = [];
  let filteredData = [];
  let currentPage = 1;
  let rowsPerPage = 10;

  const today = new Date();
  document.getElementById('date').valueAsDate = today;

  document.getElementById('report-tab').addEventListener('shown.bs.tab', function () {
    fetchReportData();
  });

  // บีบอัดรูปภาพ
  async function compressImage(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 1024;
          let width = img.width;
          let height = img.height;
          if (width > MAX_WIDTH) {
            height = Math.round((height *= MAX_WIDTH / width));
            width = MAX_WIDTH;
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7)); 
        };
      };
    });
  }

  // ส่งข้อมูล (POST)
  async function submitData() {
    const date = document.getElementById('date').value;
    const round = document.getElementById('round').value;
    if (!date || !round) {
      Swal.fire('แจ้งเตือน', 'กรุณากรอกวันที่และรอบเบิกให้ครบถ้วน', 'warning');
      return;
    }

    document.getElementById('overlay').style.display = 'flex';

    let formData = { date: date, round: round };
    const inputs = ['c_normal', 'd_dm', 'e_bd', 'f_redblack', 'g_kidney', 'h_vip', 'i_other'];
    
    for (let id of inputs) {
      let fileInput = document.getElementById(id);
      if (fileInput.files.length > 0) {
        formData[id] = await compressImage(fileInput.files[0]);
      } else {
        formData[id] = "";
      }
    }

    try {
      let response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(formData)
      });
      let result = await response.json();
      
      document.getElementById('overlay').style.display = 'none';
      if(result.status === 'success'){
        Swal.fire('สำเร็จ!', result.message, 'success').then(() => {
          document.getElementById('foodForm').reset();
          document.getElementById('date').valueAsDate = new Date();
        });
      } else {
        Swal.fire('เกิดข้อผิดพลาด', result.message, 'error');
      }
    } catch (error) {
      document.getElementById('overlay').style.display = 'none';
      Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
    }
  }

  // ดึงข้อมูลรายงาน (GET)
  async function fetchReportData() {
    document.getElementById('overlay').style.display = 'flex';
    try {
      let response = await fetch(API_URL);
      allReportData = await response.json();
      applyFilter(); // กรองและแสดงผล
    } catch (error) {
      console.error(error);
      document.getElementById('reportContainer').innerHTML = '<div class="alert alert-danger text-center">โหลดข้อมูลล้มเหลว</div>';
    }
    document.getElementById('overlay').style.display = 'none';
  }

  // กรองวันที่และคำนวณหน้า
  function applyFilter() {
    const searchDate = document.getElementById('searchDate').value;
    if (searchDate) {
      filteredData = allReportData.filter(row => row.date === searchDate);
    } else {
      filteredData = [...allReportData];
    }
    currentPage = 1;
    renderReport();
  }

  // แสดงผลรายงานตามหน้า
  // แสดงผลรายงานตามหน้า (โค้ดส่วนที่แก้ไข)
function renderReport() {
  const container = document.getElementById('reportContainer');
  const pagination = document.getElementById('paginationControls');
  
  if (filteredData.length === 0) {
    container.innerHTML = `<div class="alert alert-warning text-center">ไม่พบข้อมูล</div>`;
    pagination.style.display = 'none';
    return;
  }

  pagination.style.display = 'flex';
  
  const startIndex = (currentPage - 1) * rowsPerPage;
  const endIndex = startIndex + rowsPerPage;
  const paginatedData = filteredData.slice(startIndex, endIndex);

  let html = '';
  paginatedData.forEach(row => {
    html += `<div class="border rounded p-3 mb-4 bg-white shadow-sm">`;
    
    // 💡 แก้ไขบรรทัดนี้: เรียกใช้ formatThaiDate เพื่อเปลี่ยนการแสดงผลวันที่
    html += `<h5 class="mb-3 border-bottom pb-2 text-primary">📅 วันที่: ${formatThaiDate(row.date)} | ⏱️ รอบ: ${row.round}</h5>`;
    
    html += `<div class="row g-3">`;
    
    let hasImage = false;
    for (const [foodType, imgUrl] of Object.entries(row.images)) {
      if (imgUrl) {
        hasImage = true;
        html += `
          <div class="col-6 col-md-4 col-lg-3">
            <div class="card shadow-sm border-0 h-100 p-2">
              <a href="${imgUrl}" target="_blank">
                <img src="${imgUrl}" class="img-card" alt="${foodType}" loading="lazy">
              </a>
              <div class="card-title">${foodType}</div>
            </div>
          </div>`;
      }
    }
    if(!hasImage) { html += `<div class="col-12 text-muted text-center">- ไม่มีรูปภาพ -</div>`; }
    html += `</div></div>`;
  });
  
  container.innerHTML = html;
  updatePaginationUI();
}

  // ฟังก์ชันช่วยเหลือสำหรับ Pagination
  function updatePaginationUI() {
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    document.getElementById('pageInfo').innerText = `หน้า ${currentPage}/${totalPages}`;
  }
  function changeRowsPerPage() {
    rowsPerPage = parseInt(document.getElementById('rowsPerPage').value);
    currentPage = 1;
    renderReport();
  }
  function prevPage() {
    if (currentPage > 1) { currentPage--; renderReport(); }
  }
  function nextPage() {
    const totalPages = Math.ceil(filteredData.length / rowsPerPage);
    if (currentPage < totalPages) { currentPage++; renderReport(); }
  }

  // ฟังก์ชัน Export Excel
  function exportToExcel() {
    if (filteredData.length === 0) {
      Swal.fire('แจ้งเตือน', 'ไม่มีข้อมูลสำหรับ Export', 'info');
      return;
    }
    
    // แปลงโครงสร้างข้อมูลให้เหมาะกับ Excel
    const excelData = filteredData.map(row => {
      return {
        'วันที่': row.date,
        'รอบ': row.round,
        'อาหารธรรมดา/อ่อน': row.images['อาหารธรรมดา/อ่อน'] || '-',
        'อาหารเบาหวาน': row.images['อาหารเบาหวาน'] || '-',
        'อาหารทางสาย BD': row.images['อาหารทางสาย BD'] || '-',
        'งดดำแดง': row.images['งดดำแดง'] || '-',
        'โรคไต': row.images['โรคไต'] || '-',
        'ห้องพิเศษ': row.images['ห้องพิเศษ'] || '-',
        'อื่นๆ': row.images['อื่นๆ'] || '-'
      };
    });

    const worksheet = XLSX.utils.json_to_sheet(excelData);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "รายงานอาหาร");
    
    XLSX.writeFile(workbook, `Report_Food_${new Date().toISOString().split('T')[0]}.xlsx`);
  }
</script>
</body>
</html>
